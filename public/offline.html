<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1B5E3B" />
    <title>Hors connexion — AdresseBJ</title>
    <style>
      :root {
        --color-bg: #F5F0E8;
        --color-surface: #FFFFFF;
        --color-surface-muted: #EDE8DF;
        --color-primary: #1B5E3B;
        --color-primary-light: #2E8B57;
        --color-text-primary: #1A1A1A;
        --color-text-muted: #6B6560;
        --color-border: #D9D2C5;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        background: var(--color-bg);
        color: var(--color-text-primary);
        font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1.5rem;
      }
      main {
        max-width: 32rem;
        width: 100%;
        margin: auto;
      }
      .badge {
        display: inline-block;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--color-primary);
        margin-bottom: 0.75rem;
      }
      h1 {
        font-family: "Syne", system-ui, sans-serif;
        font-weight: 800;
        font-size: 1.5rem;
        margin: 0 0 0.5rem;
      }
      h2 {
        font-family: "Syne", system-ui, sans-serif;
        font-weight: 700;
        font-size: 1rem;
        margin: 1.5rem 0 0.5rem;
        color: var(--color-text-primary);
      }
      p {
        color: var(--color-text-muted);
        line-height: 1.5;
        margin: 0 0 1rem;
      }
      .card {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-left: 3px solid var(--color-primary);
        border-radius: 8px;
        padding: 2rem;
      }
      button, a.button {
        appearance: none;
        background: var(--color-primary);
        color: #fff;
        border: 0;
        border-radius: 8px;
        padding: 0.75rem 1.25rem;
        font-weight: 600;
        cursor: pointer;
        font-size: 0.95rem;
        text-decoration: none;
        display: inline-block;
        min-height: 44px;
        line-height: 1.2;
      }
      ul#cached-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      ul#cached-list li a {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        background: var(--color-surface-muted);
        border-radius: 8px;
        text-decoration: none;
        color: var(--color-text-primary);
        font-weight: 500;
      }
      ul#cached-list li a:hover { background: #E0DAC9; }
      ul#cached-list .code {
        font-family: "Syne", system-ui, sans-serif;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: var(--color-primary);
      }
      .empty-state {
        font-size: 0.875rem;
        color: var(--color-text-muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="badge">AdresseBJ</span>
      <h1>Vous êtes hors connexion</h1>
      <p>
        Les dernières adresses consultées sont disponibles ci-dessous.
        Reconnectez-vous au réseau pour charger les nouvelles données.
      </p>
      <button type="button" onclick="window.location.reload()">Réessayer</button>

      <h2>Adresses en cache</h2>
      <ul id="cached-list">
        <li class="empty-state" id="cached-empty">
          Chargement des adresses consultées…
        </li>
      </ul>
    </main>

    <script>
      // Pulls the address pages that the service worker has stored in the
      // "adressebj-addresses-v1" cache (see public/sw.js) and renders them
      // as clickable links — no framework required.
      (async function loadCachedAddresses() {
        var list = document.getElementById('cached-list');
        var empty = document.getElementById('cached-empty');
        try {
          if (!('caches' in window)) return;
          var cache = await caches.open('adressebj-addresses-v1');
          var requests = await cache.keys();
          var codes = requests
            .map(function (req) {
              try {
                var pathname = new URL(req.url).pathname;
                var match = pathname.match(/^\/a\/([^/?#]+)/);
                return match ? decodeURIComponent(match[1]) : null;
              } catch (_) {
                return null;
              }
            })
            .filter(function (v, idx, arr) {
              return v && arr.indexOf(v) === idx;
            });

          if (codes.length === 0) return;

          list.innerHTML = '';
          codes.forEach(function (code) {
            var li = document.createElement('li');
            var a = document.createElement('a');
            a.href = '/a/' + encodeURIComponent(code);
            var label = document.createElement('span');
            label.textContent = 'Adresse';
            var codeEl = document.createElement('span');
            codeEl.className = 'code';
            codeEl.textContent = code;
            a.appendChild(label);
            a.appendChild(codeEl);
            li.appendChild(a);
            list.appendChild(li);
          });
          if (empty && empty.parentNode) empty.parentNode.removeChild(empty);
        } catch (_) {
          // Silent failure — the empty state stays visible.
        }
      })();
    </script>
  </body>
</html>
